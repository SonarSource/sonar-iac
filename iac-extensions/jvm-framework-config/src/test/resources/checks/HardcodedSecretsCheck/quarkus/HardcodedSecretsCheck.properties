# 1. Placeholders with Default Values (Format: ${VAR:default})
quarkus.datasource.password=${DB_PASSWORD:default_db_pass}
quarkus.redis.password=${REDIS_PASS:guest}
quarkus.tls.key-store.p12.password=${KEYSTORE_PASS:changeit}

# 2. Placeholders mixed with prefixes/suffixes
quarkus.elasticsearch.api-key=prefix-${ES_API_KEY}
quarkus.oidc.credentials.secret=${OIDC_SECRET}-suffix
quarkus.mongodb.credentials.password=env-${MONGO_PASS}-prod

# 3. Spaced placeholders (Legal syntax, shouldn't be flagged)
quarkus.flyway.password=${ FLYWAY_PASSWORD }

# 4. Empty assignments (Cleared values are not secrets)
quarkus.datasource.password=
quarkus.oidc-client.credentials.secret=
quarkus.mailer.password=

# 5. Non-sensitive Metadata sharing same keywords (Should NOT match the regex anchors)
quarkus.http.auth.form.password-parameter=j_password
quarkus.security.users.embedded.plain-text=true
quarkus.oidc.credentials.secret.required=false
quarkus.kubernetes.secrets.enabled=true


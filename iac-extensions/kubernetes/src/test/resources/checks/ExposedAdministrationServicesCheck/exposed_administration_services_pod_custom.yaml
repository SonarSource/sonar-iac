apiVersion: v1
kind: Pod
metadata:
  labels:
    app: example_app
spec:
  containers:
    - name: applications
      image: my_image_with_ssh
      ports:
        - hostPort: 22
          containerPort: 8022
        - hostPort: 100  # Noncompliant {{Administration services should not be exposed.}}
                  # ^^^
          containerPort: 8022
        - hostPort: 200  # Noncompliant {{Administration services should not be exposed.}}
                  # ^^^
          containerPort: 8022
        - hostPort: 300  # Noncompliant {{Administration services should not be exposed.}}
                  # ^^^
          containerPort: 8022

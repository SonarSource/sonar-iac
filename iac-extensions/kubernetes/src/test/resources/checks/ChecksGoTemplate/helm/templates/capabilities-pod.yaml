apiVersion: v1
kind: Pod
metadata:
  name: test
spec:
  containers:
    - image: {{ .Values.image.name }}
      command: ["sleep", "6000"]
      name: test-container
      securityContext:
        capabilities:
          add: {{ .Values.capabilities | toYaml | nindent 10 }} {{- /* Noncompliant */}}
---

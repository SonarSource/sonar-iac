AWSTemplateFormatVersion: 2010-09-09
Resources:
  S3Bucketdefault:
    Type: 'AWS::S3::Bucket' # Compliant - omitting the block defaults all four attributes to true (AWS default since 2023)
    Properties:
      BucketName: "mycompliantdefaultbuckets6281"

  S3Bucket1:
    Type: 'AWS::S3::Bucket'
    #     ^^^^^^^^^^^^^^^^^> {{Related bucket}}
    Properties:
      BucketName: "mynoncompliantfirstbuckets6281"
      # Noncompliant@+1 {{Disabling public access block settings allows public ACL/policies to be set on this S3 bucket.}}
      PublicAccessBlockConfiguration:
    # ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^
        BlockPublicAcls: false
        #                ^^^^^< {{Set this property to true}}
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  S3Bucket2:
    Type: 'AWS::S3::Bucket'
    #     ^^^^^^^^^^^^^^^^^> {{Related bucket}}
    Properties:
      BucketName: "mynoncompliantsecondbuckets6281"

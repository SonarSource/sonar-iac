AWSTemplateFormatVersion: 2010-09-09
Resources:
  S3BucketWithoutPolicy:
    Type: 'AWS::S3::Bucket' # Noncompliant {{No bucket policy enforces HTTPS-only access to this bucket.}}
    #     ^^^^^^^^^^^^^^^^^
    Properties:
      BucketName: "mynoncompliantbuckets6249"

  S3BucketWrongCondition:
    Type: 'AWS::S3::Bucket' # Noncompliant
    #     ^^^^^^^^^^^^^^^^^
    Properties:
      BucketName: "mynoncompliantbuckets6249"
  S3BucketPolicyWrongCondition:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketWrongCondition
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*"
            Action: "*"
            Resource: arn:aws:s3:::mynoncompliantbuckets6249/*
            Condition:
              Bool:
                "aws:SecureTransport": true
            # SONARIAC-1803: condition value "true" inverts the protection — statement is no longer an HTTPS-only attempt,
            # so the primary issue is raised with no per-field secondaries.
  S3BucketWrongPrincipal:
    Type: 'AWS::S3::Bucket' # Noncompliant
    #     ^^^^^^^^^^^^^^^^^
    Properties:
      BucketName: "mynoncompliantbuckets6249"
  S3BucketPolicyWrongPrincipal:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketWrongPrincipal
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny # ok requests are denied
            Principal:
              AWS:
            # ^[el=+3;ec=12]< {{All principals should be restricted.}}
                - 'arn:aws:iam::127311923021:root'
            Action: "*" # ok for any actions
            Resource: arn:aws:s3:::mynoncompliantbuckets6249/* # ok for any resources
            Condition:
              Bool:
                "aws:SecureTransport": false # ok http requests are denied

  S3BucketWrongEffect:
    Type: 'AWS::S3::Bucket' # Noncompliant
    #     ^^^^^^^^^^^^^^^^^
    Properties:
      BucketName: "mynoncompliantbuckets6249"
  S3BucketPolicyWrongEffect:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketWrongEffect
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            #       ^^^^^< {{Non-conforming requests should be denied.}}
            Principal:
              AWS: "*"
            Action: "*"
            Resource: arn:aws:s3:::mynoncompliantbuckets6249/*
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketWrongAction:
    Type: 'AWS::S3::Bucket' # Noncompliant
    #     ^^^^^^^^^^^^^^^^^
    Properties:
      BucketName: "mynoncompliantbuckets6249"
  S3BucketPolicyWrongAction:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketWrongAction
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*"
            Action: "notAll"
            #       ^^^^^^^^< {{All S3 actions should be restricted.}}
            Resource: arn:aws:s3:::mynoncompliantbuckets6249/*
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketWrongResource:
    Type: 'AWS::S3::Bucket' # Noncompliant
    #     ^^^^^^^^^^^^^^^^^
    Properties:
      BucketName: "mynoncompliantbuckets6249"
  S3BucketPolicyWrongResource:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketWrongResource
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*"
            Action: "*"
            Resource: arn:aws:s3:::mynoncompliantbuckets6249/foo
                 #    ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^< {{All resources should be restricted.}}
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketCompliant:
    Type: 'AWS::S3::Bucket' # Compliant
    Properties:
      BucketName: "mycompliantbuckets6249"
  S3BucketPolicyCompliant:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: "mycompliantbuckets6249"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource: arn:aws:s3:::mycompliantbuckets6249/* # for any resources
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketCompliantStringPrincipal:
    Type: 'AWS::S3::Bucket' # Compliant
    Properties:
      BucketName: "S3BucketCompliantStringPrincipal"
  S3BucketPolicyCompliantStringPrincipal:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketCompliantStringPrincipal
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "*" # for any actions
            Resource: arn:aws:s3:::mycompliantbuckets6249/* # for any resources
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketWithBrokenBucketLink:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: []
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource: arn:aws:s3:::mycompliantbuckets6249/* # for any resources
            Condition:
              Bool:
                "aws:SecureTransport": false
  SomeRandomResource:
    Type: 'NoBucketAndNoPolicy'

  S3BucketCompliantResourcesList:
    Type: 'AWS::S3::Bucket' # Compliant
    Properties:
      BucketName: "mycompliantbuckets6249"
  S3BucketPolicyCompliantResourcesList:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketCompliantResourcesList
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource:
              - arn:aws:s3:::mycompliantbuckets6249
              - arn:aws:s3:::mycompliantbuckets6249/* # for any resources
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketCompliantResourcesListWithJoin:
    Type: 'AWS::S3::Bucket' # Compliant
    Properties:
      BucketName: "mycompliantbuckets6249"
  S3BucketPolicyCompliantResourcesListWithJoin:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketCompliantResourcesList
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource:
              - !GetAtt 'S3BucketCompliantResourcesListWithJoin.Arn'
              - !Join
                - ''
                - - !GetAtt 'S3BucketCompliantResourcesListWithJoin.Arn'
                  - /*
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketNonCompliantResourcesList:
    Type: 'AWS::S3::Bucket' # Noncompliant
    #     ^^^^^^^^^^^^^^^^^
    Properties:
      BucketName: "mynoncompliantbuckets6249"
  S3BucketPolicyNonCompliantResourcesList:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketNonCompliantResourcesList
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource:
              - arn:aws:s3:::mycompliantbuckets6249
            # ^[el=+3;ec=12]< {{All resources should be restricted.}}
              - arn:aws:s3:::mycompliantbuckets6249
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketCompliantJoinedResource:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: "S3BucketCompliantJoinedResource"
  S3BucketCompliantJoinedResourcePolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketCompliantJoinedResource
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource: !Join [ '', [ !GetAtt S3BucketCompliantJoinedResource.Arn, '/*' ] ]
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketWrongJoinedResource:
    Type: AWS::S3::Bucket # Noncompliant
    #     ^^^^^^^^^^^^^^^
    Properties:
      BucketName: "S3BucketWrongJoinedResource"
  S3BucketWrongJoinedResourcePolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketWrongJoinedResource
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource: !Join [ '', [ !GetAtt S3BucketWrongJoinedResource.Arn, 'foo' ] ]
                 #    ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^< {{All resources should be restricted.}}
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketWrongEmptyJoinedResource:
    Type: AWS::S3::Bucket # Noncompliant
    #     ^^^^^^^^^^^^^^^
    Properties:
      BucketName: "S3BucketWrongEmptyJoinedResource"
  S3BucketWrongEmptyJoinedResourcePolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3BucketWrongEmptyJoinedResource
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource: !Join [ ]
                 #    ^^^^^^^^^< {{All resources should be restricted.}}
            Condition:
              Bool:
                "aws:SecureTransport": false

  # SONARIAC-323 Unsimulated intrinsic functions lead to false positives and negatives
  CompliantBucketDueToResolvedRelation:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: "mycompliantbucket6249"
  CompliantPolicyDueToResolvedRelation:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      # Bucket relation is not resolved. However, a function call, which is not ref or sub, would not make sense here.
      Bucket: !Join [ '', [ 'mycompliantbucket6249' ] ]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource: arn:aws:s3:::mycompliantbuckets6249/* # for any resources
            Condition:
              Bool:
                "aws:SecureTransport": false
  AnotherCompliantPolicyDueToResolvedRelation:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket:
        Fn::Join: [ '', [ 'mycompliantbucket6249' ] ]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource: arn:aws:s3:::mycompliantbuckets6249/* # for any resources
            Condition:
              Bool:
                "aws:SecureTransport": false
  # Coverage purpose
  PolicyWithNonExistentFunctionCall:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !NonExistentFunctionCall [ '', [ 'mycompliantbucket6249' ] ]
  # Coverage purpose
  PolicyWithUnexpectedJoinResources:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
        Bucket: !Join [ '', [ a: b ] ]

  NonCompliantBucketDueToResolvedRelation:
    Type: 'AWS::S3::Bucket' # Noncompliant
    Properties:
      BucketName: "mynoncompliantbucket6249"
  NonompliantPolicyDueToResolvedRelation:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Join [ '', [ 'mynoncompliantbucket6249' ] ]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*" # all principals should use https
            Action: "*" # for any actions
            Resource: arn:aws:s3:::mycompliantbuckets6249/* # for any resources
            Condition:
              Bool:
                "aws:SecureTransport": true

  # SONARIAC-324 S6249 raises false positives on policies on unknown statement
  CompliantBucketDueToInsecureResourcePolicy:
    Type: AWS::S3::Bucket # Noncompliant
    Properties:
      BucketName: "S3BucketWrongEmptyJoinedResource"
  CompliantPolicyDueToInsecureResourcePolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref CompliantBucketDueToInsecureResourcePolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*"
            Action: "*"
            Resource: !GetAtt secure.resouce.policy
            Condition:
              Bool:
                "aws:SecureTransport": false

  NonCompliantBucketDueToInvalidFunctionCall:
    Type: AWS::S3::Bucket # Noncompliant
    Properties:
      BucketName: "S3BucketWrongEmptyJoinedResource"
  NonCompliantPolicyDueToInvalidFunctionCall:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref NonCompliantBucketDueToInvalidFunctionCall
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*"
            Action: "*"
            Resource: !Join ['foo', 'bar']
            Condition:
              Bool:
                "aws:SecureTransport": false

  NonCompliantBucketDueToMissingJoinStatements:
    Type: AWS::S3::Bucket # Noncompliant
    Properties:
      BucketName: "S3BucketWrongEmptyJoinedResource"
  NonCompliantPolicyDueToMissingJoinStatements:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref NonCompliantBucketDueToMissingJoinStatements
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*"
            Action: "*"
            Resource: !Join [ 'foo', []]
            Condition:
              Bool:
                "aws:SecureTransport": false

  # !Sub in Resource ARNs
  S3BucketCompliantSubResource:
    Type: AWS::S3::Bucket # Compliant
    Properties:
      BucketName: "S3BucketCompliantSubResource"
  S3BucketPolicyCompliantSubResource:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketCompliantSubResource
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource: !Sub 'arn:aws:s3:::${S3BucketCompliantSubResource}/*'
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketCompliantSubResourceList:
    Type: AWS::S3::Bucket # Compliant
    Properties:
      BucketName: "S3BucketCompliantSubResourceList"
  S3BucketPolicyCompliantSubResourceList:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketCompliantSubResourceList
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketCompliantSubResourceList}'
              - !Sub 'arn:aws:s3:::${S3BucketCompliantSubResourceList}/*'
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketCompliantGetAttAndSubResourceList:
    Type: AWS::S3::Bucket # Compliant
    Properties:
      BucketName: "S3BucketCompliantGetAttAndSubResourceList"
  S3BucketPolicyCompliantGetAttAndSubResourceList:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketCompliantGetAttAndSubResourceList
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "*"
            Resource:
              - !GetAtt S3BucketCompliantGetAttAndSubResourceList.Arn
              - !Sub '${S3BucketCompliantGetAttAndSubResourceList.Arn}/*'
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketNonCompliantSubResource:
    Type: AWS::S3::Bucket # Noncompliant
    #     ^^^^^^^^^^^^^^^
    Properties:
      BucketName: "S3BucketNonCompliantSubResource"
  S3BucketPolicyNonCompliantSubResource:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketNonCompliantSubResource
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource: !Sub 'arn:aws:s3:::${S3BucketNonCompliantSubResource}/foo'
            Condition:
              Bool:
                "aws:SecureTransport": false

  S3BucketNonCompliantSubMultipleStatements:
    Type: AWS::S3::Bucket # Noncompliant
    #     ^^^^^^^^^^^^^^^
    Properties:
      BucketName: "s3-bucket-noncompliant-sub-multiple-statements"
  S3BucketPolicyNonCompliantSubMultipleStatements:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketNonCompliantSubMultipleStatements
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # Neither statement covers /*, so neither is sufficient on its own
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketNonCompliantSubMultipleStatements}'
            Condition:
              Bool:
                "aws:SecureTransport": "false"
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketNonCompliantSubMultipleStatements}'
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  S3BucketCompliantSubMultipleStatements:
    Type: AWS::S3::Bucket # Compliant
    Properties:
      BucketName: "s3-bucket-compliant-sub-multiple-statements"
  S3BucketPolicyCompliantSubMultipleStatements:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketCompliantSubMultipleStatements
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # This makes it compliant
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketCompliantSubMultipleStatements}/*'
            Condition:
              Bool:
                "aws:SecureTransport": "false"
          # This would not be enough to make it compliant on its own
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketCompliantSubMultipleStatements}'
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  S3BucketNonCompliantActionSequence:
    Type: AWS::S3::Bucket # Noncompliant
    Properties:
      BucketName: "s3-bucket-noncompliant-action-sequence"
  S3BucketPolicyNonCompliantActionSequence:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketNonCompliantActionSequence
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action:
              - "s3:GetObject"
            Resource: "arn:aws:s3:::s3-bucket-noncompliant-action-sequence/*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  S3BucketCompliantActionSequence:
    Type: AWS::S3::Bucket # Compliant
    Properties:
      BucketName: "s3-bucket-compliant-action-sequence"
  S3BucketPolicyCompliantActionSequence:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketCompliantActionSequence
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS: "*"
            Action:
              - "s3:*"
            Resource:
              - !Join
                - ''
                - - !GetAtt S3BucketCompliantActionSequence.Arn
                  - '/*'
              - !GetAtt S3BucketCompliantActionSequence.Arn
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  S3BucketNonCompliantPrincipalSequence:
    Type: AWS::S3::Bucket # Noncompliant
    Properties:
      BucketName: "s3-bucket-noncompliant-principal-sequence"
  S3BucketPolicyNonCompliantPrincipalSequence:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketNonCompliantPrincipalSequence
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS:
                - 'arn:aws:iam::123456789012:root'
            Action: "s3:*"
            Resource: "arn:aws:s3:::s3-bucket-noncompliant-principal-sequence/*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  S3BucketCompliantPrincipalSequence:
    Type: AWS::S3::Bucket # Compliant
    Properties:
      BucketName: "s3-bucket-compliant-principal-sequence"
  S3BucketPolicyCompliantPrincipalSequence:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketCompliantPrincipalSequence
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal:
              AWS:
                - "*"
            Action: "s3:*"
            Resource: "arn:aws:s3:::s3-bucket-compliant-principal-sequence/*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  S3BucketNonCompliantEmptyResource:
    Type: AWS::S3::Bucket # Noncompliant
    Properties:
      BucketName: "s3-bucket-noncompliant-empty-resource"
  S3BucketPolicyNonCompliantEmptyResource:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketNonCompliantEmptyResource
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource: []
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  S3BucketNonCompliantEmptyAction:
    Type: AWS::S3::Bucket # Noncompliant
    Properties:
      BucketName: "s3-bucket-noncompliant-empty-action"
  S3BucketPolicyNonCompliantEmptyAction:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketNonCompliantEmptyAction
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: []
            Resource: "arn:aws:s3:::s3-bucket-noncompliant-empty-action/*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  # SONARIAC-1803: a Deny statement whose Condition is unrelated to aws:SecureTransport is
  # NOT an HTTPS-only enforcement attempt. The bucket is still Noncompliant (no HTTPS-only
  # policy), but no per-field secondaries should be raised — those would contradict the
  # actual intent of the statement.
  S3BucketNonCompliantUnrelatedCondition:
    Type: AWS::S3::Bucket # Noncompliant {{No bucket policy enforces HTTPS-only access to this bucket.}}
    Properties:
      BucketName: "s3-bucket-noncompliant-unrelated-condition"
  S3BucketPolicyNonCompliantUnrelatedCondition:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketNonCompliantUnrelatedCondition
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "s3:GetObject"
            Resource: "arn:aws:s3:::s3-bucket-noncompliant-unrelated-condition/sensitive"
            Condition:
              IpAddress:
                "aws:SourceIp": "1.2.3.4/32"

name: Setup Claude Code
description: Fetch Claude API secrets, install Claude Code if not present, configure permissions, set Portkey env vars, and record pre-run SHA

outputs:
  portkey-api-key:
    description: Portkey API key extracted from Vault
    value: ${{ fromJSON(steps.setup-claude-code.outputs.vault).PORTKEY_API_KEY }}
  pre-claude-sha:
    description: Git SHA recorded immediately before Claude Code runs
    value: ${{ steps.pre-claude.outputs.sha }}

runs:
  using: composite
  steps:
    - id: setup-claude-code
      uses: SonarSource/vault-action-wrapper@v3
      with:
        secrets: |
          development/kv/data/code-security-claude-code portkey-api-key | PORTKEY_API_KEY;

    - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
      name: Install claude code using Mise
      with:
        version: 2026.2.24
        tool_versions: |
          claude-code latest

    # The "Install claude code using Mise" step creates .tool-versions file. It needs to be removed for having clean worktree.
    - name: Remove tool-versions file
      shell: bash
      run: |
        rm .tool-versions || true

    - name: Configure Claude Code permissions
      shell: bash
      run: |
        SETTINGS='{
          "permissions": {
            "allow": [
              "Bash(find *)",
              "Bash(ls *)",
              "Bash(ls)",
              "Bash(grep *)",
              "Bash(mkdir *)",
              "Bash(cat *)",
              "Bash(cp *)",
              "Bash(mv *)",
              "Bash(sort *)",
              "Bash(head *)",
              "Bash(tail *)",
              "Bash(wc *)",
              "Bash(./gradlew *)",
              "Bash(pipenv run rspec-tools *)",
              "Bash(pipenv *)",
              "Bash(pip3 install pipenv)",
              "Bash(python3 *)",
              "Bash(git -C * fetch *)",
              "Bash(git -C * checkout *)",
              "Bash(git -C * add *)",
              "Bash(git -C * commit *)",
              "Bash(git -C * push *)",
              "Bash(git -C * log *)",
              "Bash(git -C * status *)",
              "Bash(git log *)",
              "Bash(git status *)",
              "Bash(git diff *)",
              "Bash(git fetch *)",
              "Bash(git checkout *)",
              "Bash(git add *)",
              "Bash(git commit *)",
              "Bash(git push *)",
              "Bash(jq *)",
              "Write(**)",
              "Edit(**)",
              "WebFetch(*)"
            ]
          }
        }'
        # Write user-level settings (picked up by all claude processes regardless of CWD)
        mkdir -p ~/.claude
        echo "$SETTINGS" > ~/.claude/settings.json
        # Clear any local overrides that could deny permissions saved from previous runs
        rm -f ~/.claude/settings.local.json
        # Write project-level settings (highest precedence, used by main session CWD = repo root)
        mkdir -p .claude
        echo "$SETTINGS" > .claude/settings.json

    - name: Record pre-Claude SHA
      id: pre-claude
      shell: bash
      run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT


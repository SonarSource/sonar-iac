name: 'Setup Build Environment'
description: 'Sets up mise, golangci-lint, build-logic submodule, and Go cache for Linux runners'

inputs:
  golangci-lint-version:
    description: 'Version of golangci-lint to install'
    required: false
    default: '2.4.0'
  mise-version:
    description: 'Version of mise to use'
    required: false
    default: '2026.2.24'
  checkout-build-logic:
    description: 'Whether to checkout build-logic/common submodule (set to false when using recursive submodule checkout)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
      with:
        version: ${{ inputs.mise-version }}

    - name: Install golangci-lint
      shell: bash
      env:
        GOLANGCI_LINT_VERSION: ${{ inputs.golangci-lint-version }}
      run: |
        curl --proto "=https" -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh -o /tmp/golangci-install.sh
        actual_sum=$(sha256sum /tmp/golangci-install.sh | cut -d' ' -f1)
        expected_sum="9e99d38f3213411a1b6175e5b535c72e37c7ed42ccf251d331385a3f97b695e7"
        if [ "$actual_sum" != "$expected_sum" ]; then
          echo "golangci-lint install script checksum mismatch"
          exit 1
        fi
        bash /tmp/golangci-install.sh -b /home/runner/go/bin v${GOLANGCI_LINT_VERSION}
        echo "/opt/go/bin:/opt/protoc/bin:/opt/musl/bin:/home/runner/go/bin" >> $GITHUB_PATH

    - name: Checkout build logic
      if: ${{ inputs.checkout-build-logic == 'true' }}
      shell: bash
      run: git submodule update --init --depth 1 -- build-logic/common

    - name: Create Go cache keys
      shell: bash
      env:
        GITHUB_WORKSPACE: ${{ github.workspace }}
      run: |
        export GOCACHE=$(go env GOCACHE)
        echo "GOCACHE=${GOCACHE}" >> $GITHUB_ENV
        export GOCACHE_KEY=$(find ${GITHUB_WORKSPACE}/sonar-helm-for-iac -name '*.go' -o -name 'go.mod' -o -name 'go.sum' 2>/dev/null | \
          xargs cat 2>/dev/null | sha256sum | xargs echo $RUNNER_OS $RUNNER_ARCH | tr -s ' ' '-')
        echo "GOCACHE_KEY=${GOCACHE_KEY}" >> $GITHUB_ENV

    - name: Cache Go Build
      uses: SonarSource/gh-action_cache@v1
      with:
        path: ${{ env.GOCACHE }}
        key: ${{ env.GOCACHE_KEY }}
